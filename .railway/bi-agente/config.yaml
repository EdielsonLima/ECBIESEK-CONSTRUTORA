model:
  default: qwen/qwen3.6-plus
  provider: auto
  base_url: https://openrouter.ai/api/v1
providers: {}
fallback_providers: []
credential_pool_strategies: {}
toolsets:
- hermes-cli
agent:
  max_turns: 60
  gateway_timeout: 1800
  restart_drain_timeout: 60
  service_tier: ''
  tool_use_enforcement: auto
  gateway_timeout_warning: 900
  gateway_notify_interval: 600
  verbose: false
  reasoning_effort: medium
  personalities:
    helpful: You are a helpful, friendly AI assistant.
    concise: You are a concise assistant. Keep responses brief and to the point.
    technical: You are a technical expert. Provide detailed, accurate technical information.
    creative: You are a creative assistant. Think outside the box and offer innovative
      solutions.
    teacher: You are a patient teacher. Explain concepts clearly with examples.
terminal:
  backend: local
  modal_mode: auto
  cwd: .
  timeout: 180
  env_passthrough: []
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
  docker_forward_env: []
  docker_env: {}
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true
  docker_volumes: []
  docker_mount_cwd_to_workspace: false
  persistent_shell: true
  lifetime_seconds: 300
browser:
  inactivity_timeout: 120
  command_timeout: 30
  record_sessions: false
  allow_private_urls: false
checkpoints:
  enabled: true
  max_snapshots: 50
file_read_max_chars: 100000
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
smart_model_routing:
  enabled: true
  max_simple_chars: 160
  max_simple_words: 28
  cheap_model:
    provider: openrouter
    model: deepseek/deepseek-v3.2
    base_url: https://openrouter.ai/api/v1
auxiliary:
  vision:
    provider: openrouter
    model: google/gemini-2.5-flash
    base_url: https://openrouter.ai/api/v1
    api_key: ''
    timeout: 120
    download_timeout: 30
  web_extract:
    provider: openrouter
    model: deepseek/deepseek-v3.2
    base_url: https://openrouter.ai/api/v1
    api_key: ''
    timeout: 360
  compression:
    provider: openrouter
    model: google/gemini-2.5-flash
    base_url: https://openrouter.ai/api/v1
    api_key: ''
    timeout: 120
  session_search:
    provider: openrouter
    model: deepseek/deepseek-v3.2
    base_url: https://openrouter.ai/api/v1
    api_key: ''
    timeout: 30
  skills_hub:
    provider: openrouter
    model: google/gemini-2.5-flash
    base_url: https://openrouter.ai/api/v1
    api_key: ''
    timeout: 30
  approval:
    provider: openrouter
    model: google/gemini-2.5-flash
    base_url: https://openrouter.ai/api/v1
    api_key: ''
    timeout: 30
  mcp:
    provider: openrouter
    model: google/gemini-2.5-flash
    base_url: https://openrouter.ai/api/v1
    api_key: ''
    timeout: 30
  flush_memories:
    provider: openrouter
    model: deepseek/deepseek-v3.2
    base_url: https://openrouter.ai/api/v1
    api_key: ''
    timeout: 30
display:
  compact: false
  personality: concise
  resume_display: full
  busy_input_mode: interrupt
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  inline_diffs: true
  show_cost: false
  skin: default
  interim_assistant_messages: true
  tool_progress_command: false
  tool_progress_overrides: {}
  tool_preview_length: 0
  platforms: {}
  tool_progress: all
  background_process_notifications: all
dashboard:
  theme: default
privacy:
  redact_pii: false
tts:
  provider: edge
  edge:
    voice: en-US-AriaNeural
  openai:
    model: gpt-4o-mini-tts
    voice: alloy
stt:
  enabled: true
  provider: openai
  openai:
    model: whisper-1
    language: pt
voice:
  record_key: ctrl+b
  max_recording_seconds: 120
  auto_tts: false
  silence_threshold: 200
  silence_duration: 3
human_delay:
  mode: 'off'
  min_ms: 800
  max_ms: 2500
context:
  engine: compressor
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  provider: ''
  nudge_interval: 10
  flush_min_turns: 6
delegation:
  model: deepseek/deepseek-v3.2
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  api_key: null
  max_iterations: 50
  reasoning_effort: ''
  default_toolsets:
  - terminal
  - file
  - web
prefill_messages_file: ''
skills:
  external_dirs: []
  creation_nudge_interval: 15
  disabled:
  - ascii-art
  - ascii-video
  - audiocraft-audio-generation
  - axolotl
  - claude-code
  - clip
  - dspy
  - fine-tuning-with-trl
  - gguf-quantization
  - grpo-rl-training
  - linear
  - manim-video
  - minecraft-modpack-server
  - modal-serverless-gpu
  - notion
  - opencode
  - openhue
  - peft-fine-tuning
  - pokemon-player
  - polymarket
  - pytorch-fsdp
  - songsee
  - songwriting-and-ai-music
  - unsloth
  - weights-and-biases
  - xitter
approvals:
  mode: manual
  timeout: 60
command_allowlist:
- delete in root path
- script execution via -e/-c flag
- script execution via heredoc
quick_commands: {}
personalities: {}
security:
  redact_secrets: true
  tirith_enabled: true
  tirith_path: tirith
  tirith_timeout: 5
  tirith_fail_open: true
  website_blocklist:
    enabled: false
    domains: []
    shared_files: []
cron:
  wrap_response: true
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3
network:
  force_ipv4: false
_config_version: 17
fallback_model:
  provider: openrouter
  model: deepseek/deepseek-v3.2
  base_url: https://openrouter.ai/api/v1
web:
  backend: tavily
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
group_sessions_per_user: true
streaming:
  enabled: false
platform_toolsets:
  cli:
  - hermes-cli
  telegram:
  - hermes-telegram
  discord:
  - hermes-discord
  whatsapp:
  - hermes-whatsapp
  slack:
  - hermes-slack
  signal:
  - hermes-signal
  homeassistant:
  - hermes-homeassistant
  qqbot:
  - hermes-qqbot
code_execution:
  timeout: 300
  max_tool_calls: 50
TELEGRAM_HOME_CHANNEL: '5678462973'
mcp_servers: {}
